<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Wide document workflow sample</title>
  <desc id="desc">A wide diagram used to test rotation in the Markdown to PDF app.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef8f6"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1600" height="520" rx="28" fill="url(#bg)"/>
  <g fill="none" stroke="#94a3b8" stroke-width="3">
    <path d="M315 260h160"/>
    <path d="M705 260h160"/>
    <path d="M1095 260h160"/>
  </g>
  <g fill="#94a3b8">
    <path d="m474 260-22-13v26z"/>
    <path d="m864 260-22-13v26z"/>
    <path d="m1254 260-22-13v26z"/>
  </g>
  <g filter="url(#shadow)" font-family="Inter, system-ui, sans-serif">
    <g transform="translate(95 135)">
      <rect width="220" height="250" rx="18" fill="#ffffff" stroke="#b9e3dc"/>
      <circle cx="110" cy="72" r="34" fill="#0f766e"/>
      <text x="110" y="82" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">1</text>
      <text x="110" y="145" text-anchor="middle" font-size="30" font-weight="700" fill="#172033">Markdown</text>
      <text x="110" y="184" text-anchor="middle" font-size="20" fill="#475569">paste or load</text>
    </g>
    <g transform="translate(485 135)">
      <rect width="220" height="250" rx="18" fill="#ffffff" stroke="#fed7aa"/>
      <circle cx="110" cy="72" r="34" fill="#c2410c"/>
      <text x="110" y="82" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">2</text>
      <text x="110" y="145" text-anchor="middle" font-size="30" font-weight="700" fill="#172033">Preview</text>
      <text x="110" y="184" text-anchor="middle" font-size="20" fill="#475569">A4 layout</text>
    </g>
    <g transform="translate(875 135)">
      <rect width="220" height="250" rx="18" fill="#ffffff" stroke="#bae6fd"/>
      <circle cx="110" cy="72" r="34" fill="#0369a1"/>
      <text x="110" y="82" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">3</text>
      <text x="110" y="145" text-anchor="middle" font-size="30" font-weight="700" fill="#172033">Rotate</text>
      <text x="110" y="184" text-anchor="middle" font-size="20" fill="#475569">wide blocks</text>
    </g>
    <g transform="translate(1265 135)">
      <rect width="220" height="250" rx="18" fill="#ffffff" stroke="#c7d2fe"/>
      <circle cx="110" cy="72" r="34" fill="#4338ca"/>
      <text x="110" y="82" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">4</text>
      <text x="110" y="145" text-anchor="middle" font-size="30" font-weight="700" fill="#172033">PDF</text>
      <text x="110" y="184" text-anchor="middle" font-size="20" fill="#475569">browser print</text>
    </g>
  </g>
</svg>
